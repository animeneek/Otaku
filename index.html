<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Player</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-900 text-white">

<div class="container mx-auto p-6 max-w-4xl">

<h1 class="text-3xl font-bold text-center mb-6">
Anime Player
</h1>

<div class="flex gap-2 mb-4">

<input id="search"
class="flex-1 p-2 rounded text-black"
placeholder="Search anime">

<button id="searchBtn"
class="bg-blue-500 px-4 py-2 rounded">
Search
</button>

</div>

<div class="grid grid-cols-3 gap-3 mb-4">

<select id="animeSelect" class="p-2 rounded text-black"></select>

<select id="episodeSelect" class="p-2 rounded text-black"></select>

<select id="langSelect" class="p-2 rounded text-black">
<option value="sub">Sub</option>
<option value="dub">Dub</option>
</select>

</div>

<button id="playBtn"
class="w-full bg-green-500 py-2 rounded mb-4">
Play
</button>

<div class="aspect-video bg-black rounded overflow-hidden">

<iframe
id="player"
class="w-full h-full"
allowfullscreen>
</iframe>

</div>

<div id="embedURL"
class="mt-3 text-green-400 break-all"></div>

</div>

<script src="script.js"></script>

</body>
</html>
